name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev, personal-staging]

permissions:
  contents: read

jobs:
  test:
    name: Engine + skill + dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Seed to the path the loader actually imports from. profile.ts does
      # `import ... from "./profile.json"`, so the file must be its sibling —
      # a copy at the repo root type-checks nowhere and deploys nowhere.
      - name: Seed profile.json
        run: cp profile.example.json supabase/functions/_shared/profile.json

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run engine Deno tests (open-brain-mcp)
        run: deno test --allow-read --allow-env --config supabase/functions/open-brain-mcp/deno.json supabase/functions/open-brain-mcp/_agent_tasks_test.ts

      # Type-checks the whole module graph, including the profile.json import.
      # This is what catches a fresh-clone break that the tests above miss.
      - name: Type-check Edge Functions
        run: deno check --config supabase/functions/open-brain-mcp/deno.json supabase/functions/open-brain-mcp/index.ts

      - name: Verify queue-runner skill contract
        run: node skills/queue-runner/verify.mjs

      - name: Run closeout-controller tests
        run: node --test scripts/open-engine/closeout-controller.test.mjs

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run dashboard node:test suites
        working-directory: dashboard
        run: node --test tests/*.test.mjs

      - name: Type-check dashboard
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        working-directory: dashboard
        env:
          # Build-time env stubs. The dashboard reads real secrets at runtime via Railway,
          # but Next.js's lint/type pass crashes if these are unset at build time.
          SUPABASE_URL: https://ci.invalid
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
          OPENROUTER_API_KEY: ci-placeholder
          DASHBOARD_PASSWORD: ci-placeholder
          BRAIN_BANK_URL: https://ci.invalid
          BRAIN_BANK_API_KEY: ci-placeholder
        run: npm run build
